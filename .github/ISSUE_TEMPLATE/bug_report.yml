name: Bug report
description: Report a GoldSun problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GoldSun version
      placeholder: "0.1.0"
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.6"
