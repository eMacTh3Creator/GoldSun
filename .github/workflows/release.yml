name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: swift test

      - name: Package
        run: ./script/package_release.sh "${{ steps.version.outputs.value }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GoldSun-${{ steps.version.outputs.value }}
          path: |
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.pkg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.dmg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.app.zip

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          body: |
            GoldSun ${{ steps.version.outputs.value }} prerelease.

            This build packages the native macOS Swift browser shell, Chrome Web Store / Manifest V3 planning surfaces, built-in ad blocker preferences, home navigation, bookmark management, tab bar options, and the bundled app icon.

            These artifacts are unsigned and not notarized yet. macOS Gatekeeper may warn or block installation until Developer ID signing and notarization are configured.
          files: |
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.pkg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.dmg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.app.zip
          draft: false
          prerelease: true
