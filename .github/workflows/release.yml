name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "0.2.13"

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: swift test

      - name: Package
        run: ./script/package_release.sh "${{ steps.version.outputs.value }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GoldSun-${{ steps.version.outputs.value }}
          path: |
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.pkg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.dmg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.app.zip

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          body: |
            GoldSun ${{ steps.version.outputs.value }} prerelease.

            This build packages the native macOS Swift browser shell, persistent tab web views, real right-click link opening in new windows, new-tab link actions, cleaner GoldSun offline start page, browser chrome, built-in bookmark, history, download, and password pages, browser-compatible bookmark import/export, privacy-controlled browsing history, address-bar select-all editing, Keychain-backed password management with native save prompts and browser CSV import/export, macOS default-browser registration metadata, signed-build passkey readiness, native WebKit user-agent identity for the development backend, a default-browser handoff for blocked sign-in flows, YouTube-compatible element fullscreen support, favicon-aware tab bar and bookmarks, built-in ad blocker preferences, WebKit content-rule blocking, HTTPS-first navigation, tracker-parameter cleanup, bookmark management, download management, auto-update checks with installer handoff quitting, and the bundled app icon.

            The codebase now includes the first Chromium/CEF proof-of-life engine (pinned CEF 149 behind an Objective-C++ bridge with automatic WebKit fallback). This CI artifact is built without the CEF cache, so it ships WebKit-only; local builds after running script/fetch_cef.sh get the Chromium engine. Chrome Web Store install surfaces remain hidden until a real Chromium extension runtime is available.

            These artifacts are unsigned and not notarized yet. macOS Gatekeeper may warn or block installation until Developer ID signing and notarization are configured.
          files: |
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.pkg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.dmg
            release/${{ steps.version.outputs.value }}/GoldSun-${{ steps.version.outputs.value }}.app.zip
          draft: false
          prerelease: true
